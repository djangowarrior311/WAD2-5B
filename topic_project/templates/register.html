<!DOCTYPE html>

{% extends 'main-base.html' %}
{% load static %}

{% block body_block %}
<h1> Register for Topic - your home for all learning tools!  </h1>
{% if registered %}
<strong> Thank you for registering! </strong>
{% else %}
<form id="user_form" method="post" action="{% url 'topic:register' %}"
        enctype="multipart/form-data">

    {% csrf_token %}
    {{ user_form.as_p }}
    
    <input type="submit" name="submit" value="Register" />
</form>
{% endif %}

{% endblock %}
